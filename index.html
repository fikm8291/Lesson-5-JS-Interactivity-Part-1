<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactivity Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactivity Playground</h1>
        <button id="theme-btn">Switch Theme</button>
    </header>

    <main id="card">
        <h2>Interactive Card</h2>
        
        <section id="toggle-section">
            <button id="toggle-btn">Show Info</button>
            <div id="extra-info" style="display: none;">
                <p>Congratulations! You have successfully used JavaScript to toggle the visibility of this element. This is a common pattern used in modern web apps.</p>
            </div>
        </section>

        <hr>

        <section id="skills-section">
            <h3>Technical Skills</h3>
            <button id="glow-btn">Highlight Skills</button>
            <ul id="skills-list">
                <li>HTML5 & CSS3</li>
                <li>Python Programming</li>
                <li>JavaScript Logic</li>
            </ul>
        </section>
    </main>

    </body>
</html>
